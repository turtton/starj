services:
  mysql:
    image: docker.io/library/mysql:8.4
    container_name: starj-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-starj}
      MYSQL_USER: ${SPRING_DATASOURCE_USERNAME:-starj}
      MYSQL_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-starj}
    volumes:
      - starj-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: docker.io/library/redis:7.4-alpine
    container_name: starj-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - starj-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: docker.io/minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: starj-minio
    restart: unless-stopped
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    volumes:
      - starj-minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # One-shot: create the application bucket the app expects (it does not self-create).
  # Started on demand (e.g. `podman compose run --rm minio-init`) or as part of a full
  # `podman compose up`. Idempotent.
  minio-init:
    image: docker.io/minio/mc:latest
    depends_on:
      - minio
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >
        until mc alias set local http://minio:9000
        "${MINIO_ROOT_USER:-minioadmin}" "${MINIO_ROOT_PASSWORD:-minioadmin}";
        do echo 'waiting for minio...'; sleep 1; done;
        mc mb --ignore-existing "local/${MINIO_BUCKET:-starj}";
        echo "bucket ready: ${MINIO_BUCKET:-starj}"

volumes:
  starj-mysql-data:
  starj-redis-data:
  starj-minio-data:
