spring.application.name=starj

# MyBatis
mybatis.configuration.map-underscore-to-camel-case=true

# Multipart Upload
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Session
spring.session.store-type=redis
spring.session.redis.namespace=starj:session
spring.session.timeout=30m

# Session Cookie
server.servlet.session.cookie.name=SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax

# Redis
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

# S3/MinIO
storage.s3.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.s3.access-key=${MINIO_ROOT_USER:minioadmin}
storage.s3.secret-key=${MINIO_ROOT_PASSWORD:minioadmin}
storage.s3.region=${MINIO_REGION:us-east-1}
storage.s3.bucket=${MINIO_BUCKET:starj}
